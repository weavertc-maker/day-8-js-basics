<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 8 - JavaScript Basics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-bold mb-8">Day 8: JavaScript Fundamentals</h1>
        <p class="text-zinc-400 mb-8">Open the browser console (Cmd + Option + J on Mac) to see output.</p>
        
        <div id="output" class="bg-zinc-900 p-6 rounded-2xl font-mono text-sm leading-relaxed"></div>
    </div>

    <script>
    const output = document.getElementById('output');

    function log(message) {
        output.innerHTML += `<div class="mb-2">${message}</div>`;
        console.log(message);
    }

    log("<strong>=== Day 8: JavaScript Basics ===</strong>");

    // 1. Variables - let, const, var (we avoid var in modern code)
    let name = "Tanner Weaver";
    const location = "Kerrtown, PA";
    log(`Name: ${name}, Location: ${location}`);

    // 2. Data Types
    let age = 33;                    // number
    let isLearning = true;           // boolean
    let skills = ["HTML", "CSS", "Tailwind", "JavaScript"]; // array
    let profile = {                  // object
        name: name,
        location: location,
        daysCompleted: 8
        daysRemaining: 22
    };

    log(`Age: ${age}, Learning: ${isLearning}`);
    log(`Skills: ${skills.join(", ")}`);

    // 3. Functions
    function greet(person) {
        return `Hello ${person}, welcome to Day 8!`;
    }

    log(greet("Tanner"));

    // 4. Arrow Functions (modern preferred)
    const add = (a, b) => a + b;
    log(`5 + 7 = ${add(5, 7)}`);

    // 5. Basic DOM Manipulation
    document.querySelector('h1').style.color = '#10b981';
    log("Changed heading color using JavaScript");

    log("<strong>Week 2 has begun. Fundamentals loaded.</strong>");
</script>
</body>
</html>
