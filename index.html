<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 10 - Events & Interactivity</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen p-8">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-5xl font-bold mb-4">Day 10: Events Mastery</h1>
        <p class="text-zinc-400 mb-12">Click, type, hover, and scroll — watch what happens.</p>

        <!-- Demo Area -->
        <div class="space-y-12">
            
            <!-- Click Demo -->
            <div class="bg-zinc-900 p-8 rounded-3xl">
                <h2 class="text-2xl font-semibold mb-6">1. Click Events</h2>
                <button id="click-btn" 
                        class="px-8 py-4 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-medium text-lg transition-all active:scale-95">
                    Click Me!
                </button>
                <p id="click-output" class="mt-6 text-emerald-400 font-mono"></p>
            </div>

            <!-- Input Demo -->
            <div class="bg-zinc-900 p-8 rounded-3xl">
                <h2 class="text-2xl font-semibold mb-6">2. Input & Keyboard Events</h2>
                <input type="text" id="name-input" 
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-emerald-500"
                       placeholder="Type your name...">
                <p id="input-output" class="mt-6 text-emerald-400 font-mono"></p>
            </div>

            <!-- Remove Last Message Demo -->
            <div class="bg-zinc-900 p-8 rounded-3xl">
                <h2 class="text-2xl font-semibold mb-6">1. Click Events</h2>
                <button id="click-btn" 
                        class="px-8 py-4 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-medium text-lg transition-all active:scale-95">
                    Click Me!
                </button>
                <p id="click-output" class="mt-6 text-emerald-400 font-mono"></p>
            </div>

            <!-- Hover & Mouse Events -->
            <div class="bg-zinc-900 p-8 rounded-3xl">
                <h2 class="text-2xl font-semibold mb-6">3. Hover & Mouse Events</h2>
                <div id="hover-box" 
                     class="h-40 bg-zinc-800 rounded-3xl flex items-center justify-center text-2xl font-medium cursor-pointer hover:bg-amber-600 transition-colors">
                    Hover or Click Me
                </div>
            </div>

            <!-- Scroll Demo -->
            <div class="bg-zinc-900 p-8 rounded-3xl">
                <h2 class="text-2xl font-semibold mb-6">4. Scroll Event</h2>
                <div class="h-96 overflow-auto border border-zinc-700 rounded-3xl p-6 bg-zinc-950" id="scroll-container">
                    <p class="leading-relaxed">Scroll inside this box...</p>
                    <p class="leading-relaxed mt-8">Keep scrolling...</p>
                    <p class="leading-relaxed mt-8">More content...</p>
                    <p class="leading-relaxed mt-8">Almost there...</p>
                    <p class="leading-relaxed mt-8">You made it!</p>
                </div>
                <p id="scroll-output" class="mt-6 text-emerald-400 font-mono"></p>
            </div>
        </div>
    </div>

    <script>
        // ====================== DAY 10 EVENT CODE ======================

        // 1. Click Event
        const clickBtn = document.getElementById('click-btn');
        const clickOutput = document.getElementById('click-output');

        clickBtn.addEventListener('click', () => {
            clickOutput.textContent = `Button clicked at ${new Date().toLocaleTimeString()}`;
            clickBtn.textContent = "Clicked! ✅";
            
            // Reset button text after 2 seconds
            setTimeout(() => {
                clickBtn.textContent = "Click Me!";
            }, 2000);
        });

        // 2. Input & Keyboard Events
        const nameInput = document.getElementById('name-input');
        const inputOutput = document.getElementById('input-output');

        nameInput.addEventListener('input', (e) => {
            inputOutput.textContent = `Live typing: ${e.target.value}`;
        });

        // 3. Remove Input & Keyboard Events
        clearButton.addActionListener(e -> {
            textField.setText(""); // This clears the text box
        });

        nameInput.addEventListener('keypress', (e) => {
            if (e.key === "Enter") {
                inputOutput.textContent = `Pressed Enter! You typed: ${nameInput.value}`;
            }
        });

        // 4. Mouse Events (hover, click, etc.)
        const hoverBox = document.getElementById('hover-box');

        hoverBox.addEventListener('mouseover', () => {
            hoverBox.textContent = "You're hovering! 👀";
        });

        hoverBox.addEventListener('mouseout', () => {
            hoverBox.textContent = "Hover or Click Me";
        });

        hoverBox.addEventListener('click', () => {
            hoverBox.style.backgroundColor = '#eab308';
            hoverBox.textContent = "You clicked me! 🔥";
            
            setTimeout(() => {
                hoverBox.style.backgroundColor = '';
                hoverBox.textContent = "Hover or Click Me";
            }, 1500);
        });

        // 5. Scroll Event
        const scrollContainer = document.getElementById('scroll-container');
        const scrollOutput = document.getElementById('scroll-output');
        let scrollCount = 0;

        scrollContainer.addEventListener('scroll', () => {
            scrollCount++;
            scrollOutput.textContent = `Scrolled ${scrollCount} times inside the box`;
        });

        // Bonus: Global click example + Event Delegation concept preview
        document.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' && !e.target.id) {
                console.log('A button was clicked:', e.target.textContent);
            }
        });

        console.log("%cDay 10 Events loaded successfully!", "color: #10b981; font-weight: bold");
    </script>
</body>
</html>
