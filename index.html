<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 8 - JavaScript Basics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-4xl font-bold mb-8">Day 8: JavaScript Fundamentals</h1>
        <p class="text-zinc-400 mb-8">Open the browser console (Cmd + Option + J on Mac) to see output.</p>
        
        <div id="output" class="bg-zinc-900 p-6 rounded-2xl font-mono text-sm leading-relaxed"></div>
    </div>

<script>
    const output = document.getElementById('output');

    function log(message) {
        output.innerHTML += `<div class="mb-3">${message}</div>`;
        console.log(message);
    }

    log("<strong>=== Day 9: Array Methods Deep Dive ===</strong>");

    // Starting array
    let skills = [
        { name: "HTML", level: "strong" },
        { name: "CSS", level: "strong" },
        { name: "Tailwind CSS", level: "medium" },
        { name: "JavaScript", level: "beginner" },
        { name: "Git", level: "medium" }
    ];

    log(`Total skills: ${skills.length}`);

    // 1. forEach - Loop through and display
    log("<strong>Current Skills:</strong>");
    skills.forEach(skill => {
        log(`• ${skill.name} (${skill.level})`);
    });

    // 2. map - Create a new array with transformed data
    const skillNames = skills.map(skill => skill.name.toUpperCase());
    log(`<strong>Uppercase names (map):</strong> ${skillNames.join(" • ")}`);

    // 3. filter - Get only skills at certain level
    const strongSkills = skills.filter(skill => skill.level === "strong");
    log(`<strong>Strong skills (filter):</strong> ${strongSkills.map(s => s.name).join(", ")}`);

    // 4. find - Find the first matching item
    const jsSkill = skills.find(skill => skill.name === "JavaScript");
    log(`Found JavaScript level: ${jsSkill ? jsSkill.level : "Not found"}`);

    // 5. Combining methods - Chain them together (very common pattern)
    const beginnerSkills = skills
        .filter(skill => skill.level === "beginner")
        .map(skill => skill.name);

    log(`Beginner skills (chained filter + map): ${beginnerSkills.join(", ")}`);

    // Bonus: Add a new skill dynamically
    function addNewSkill(skillName, skillLevel = "beginner") {
        skills.push({ name: skillName, level: skillLevel });
        log(`✅ Added: ${skillName} (${skillLevel})`);
        console.table(skills);   // Nice formatted table in console
    }

    // Create "Add Skill" button
    const btn = document.createElement('button');
    btn.textContent = "Add New Skill";
    btn.className = "mt-8 px-6 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-medium transition-all active:scale-95";
    document.querySelector('div.max-w-2xl').appendChild(btn);

    btn.addEventListener('click', () => {
        const name = prompt("Skill name:");
        const level = prompt("Level (strong / medium / beginner):", "beginner");
        
        if (name && name.trim() !== "") {
            addNewSkill(name.trim(), level.toLowerCase());
        }
    });

    // Try these yourself:
    const sortedSKills = skills.sort((a, b) => a.name.localCompare(b.name));
    log("Sorted alphabetically: " + sortedSkills.map(s => s.name).join(" , "));

    log("<strong>Try clicking the button to add a new skill using array methods!</strong>");
</script>
</body>
</html>
